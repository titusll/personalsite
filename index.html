<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sup gang</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      background: var(--card);
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }

    .accent { color: var(--accent); }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0.5rem 0 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Daily <span class="accent"></span></h1>
    <p>blah.</p>
    <span class="badge">🚀 Deployed via Vercel</span>
  </main>
</body>
</html>
